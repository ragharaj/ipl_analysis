# This is a Databricks asset bundle definition for ipl_analysis.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: ipl_analysis
  uuid: 014cd37b-0922-4246-900b-e5d59a9b4788

include:
  - resources/*.yml
  - resources/*/*.yml

artifacts:
  python_artifact:
    type: whl
    build: uv build --wheel

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-7b106152-caf3.cloud.databricks.com
    variables:
      catalog: bootcamp_students
      schema: dev
  prod:
    mode: production
    workspace:
      host: https://dbc-7b106152-caf3.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/ragha.raj90@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/ragha.raj90@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: bootcamp_students
      schema: prod
    permissions:
      - user_name: ragha.raj90@gmail.com
        level: CAN_MANAGE
