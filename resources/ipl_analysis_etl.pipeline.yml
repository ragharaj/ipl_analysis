# The main pipeline for ipl_analysis

resources:
  pipelines:
    ipl_analysis_etl:
      name: ipl_analysis_etl
      catalog: ${var.catalog}
      schema: ${var.schema}
      serverless: true
      root_path: "../src/ipl_analysis_etl"

      libraries:
        - glob:
            include: ../src/ipl_analysis_etl/transformations/**

      environment:
        dependencies:
          # We include every dependency defined by pyproject.toml by defining an editable environment
          # that points to the folder where pyproject.toml is deployed.
          - --editable ${workspace.file_path}
